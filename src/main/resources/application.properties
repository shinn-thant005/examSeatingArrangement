spring.application.name=exam.seating

# --- MySQL Configuration ---
# Change 'exam_seating' to whatever you name your database in MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/exam_seating?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
# Put your MySQL Workbench/Command Line password here:
spring.datasource.password=323978
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Hibernate Configuration ---
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'update' tells Hibernate to automatically create your tables based on your Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true



